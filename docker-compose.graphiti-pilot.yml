# One pinned local graph backend for the Graphiti experiment-memory pilot.
# docs/plans/graphiti/10-PLATFORM-AND-DEPLOYMENT-PLAN.md requirements:
# loopback-only, fixed image version, explicit memory/CPU limits, named local
# volume, health check, operator opt-in startup (never started by NLO runs).
#
# Usage (operator opt-in only):
#   cp .env.graphiti.example .env.graphiti   # set a real local password
#   bash scripts/graph/graph-up.sh
services:
  neo4j:
    image: neo4j:5.26.0-community
    container_name: nlo-graphiti-pilot-neo4j
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NLO_GRAPH_NEO4J_PASSWORD:?copy .env.graphiti.example to .env.graphiti and set a password}"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "512m"
      NEO4J_server_memory_pagecache_size: "256m"
    volumes:
      - nlo-graphiti-pilot-data:/data
    mem_limit: 1536m
    cpus: 2.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: "no"

volumes:
  nlo-graphiti-pilot-data:
    name: nlo-graphiti-pilot-data
